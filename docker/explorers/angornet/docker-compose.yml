# Angor Testnet (Signet) Explorer Stack
#
# This runs the full stack: custom signet node, Fulcrum electrum server,
# MariaDB, official mempool backend (API) and frontend (explorer).
#
# The node syncs from the Angor signet peer at 207.180.254.78 (no mining).
# TLS is handled externally via FRP reverse proxy + Caddy on the VPS.
#
# Exposed ports:
#   - 8080  -> mempool frontend + API  (test.indexer.angor.io)
#   - 8999  -> mempool backend API     (internal, proxied by frontend)
#   - 38333 -> signet p2p
#   - 38332 -> signet RPC
#
# Prerequisites:
#   The blockcore/bitcoin-signet image must be built locally from
#   bitcoin-custom-signet (it is not published to Docker Hub).
#
# Usage:
#   docker compose up -d

volumes:
  blockchain:
    name: angornet-btc-data
  mempool_api:
    name: angornet-mempool-cache
  mempool_db:
    name: angornet-mempool-db
  fulcrum_data:
    name: angornet-fulcrum-data

services:

  node:
    container_name: angornet-btc-node
    image: blockcore/bitcoin-signet:latest
    mem_limit: 2048m
    cpus: 0.8
    healthcheck:
      test: ["CMD", "bitcoin-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 10s
    restart: unless-stopped
    stop_grace_period: 15m
    volumes:
      - blockchain:/root/.bitcoin
    environment:
      UACOMMENT: angornet-testnet-node
      BLOCKPRODUCTIONDELAY: ${BLOCKPRODUCTIONDELAY:-30}
      MINERENABLED: "0"
      NBITS: ${NBITS:-1d00ffff}
      SIGNETCHALLENGE: "512102a3f8184701a033e5f8faa295647374b0bbc868082240d6e7ad8e9ecb0d86e6d451ae"
      RPCUSER: ${RPCUSER:-rpcuser}
      RPCPASSWORD: ${RPCPASSWORD:-rpcpassword}
      ADDNODE: "207.180.254.78"
    ports:
      - "38333:38333"
      - "38332:38332"
    networks:
      - btcnetwork

  fulcrum:
    container_name: angornet-fulcrum
    image: cculianu/fulcrum:latest
    user: root
    depends_on:
      node:
        condition: service_healthy
    volumes:
      - fulcrum_data:/fulcrum_db
    command: >
      Fulcrum
      --bitcoind angornet-btc-node:38332
      --rpcuser rpcuser
      --rpcpassword rpcpassword
      --tcp 0.0.0.0:50001
      --stats 0.0.0.0:3003
    restart: unless-stopped
    networks:
      - btcnetwork

  db:
    container_name: angornet-mempool-db
    image: mariadb:10.5.21
    environment:
      MYSQL_DATABASE: "mempool"
      MYSQL_USER: "mempool"
      MYSQL_PASSWORD: "mempool"
      MYSQL_ROOT_PASSWORD: "admin"
    restart: unless-stopped
    stop_grace_period: 1m
    volumes:
      - mempool_db:/var/lib/mysql
    networks:
      - btcnetwork

  api:
    container_name: angornet-mempool-api
    image: mempool/backend:latest
    user: "0:0"
    depends_on:
      - db
      - fulcrum
    environment:
      MEMPOOL_NETWORK: "signet"
      MEMPOOL_BACKEND: "electrum"
      ELECTRUM_HOST: "angornet-fulcrum"
      ELECTRUM_PORT: "50001"
      ELECTRUM_TLS_ENABLED: "false"
      CORE_RPC_HOST: "angornet-btc-node"
      CORE_RPC_PORT: "38332"
      CORE_RPC_USERNAME: "rpcuser"
      CORE_RPC_PASSWORD: "rpcpassword"
      DATABASE_ENABLED: "true"
      DATABASE_HOST: "angornet-mempool-db"
      DATABASE_DATABASE: "mempool"
      DATABASE_USERNAME: "mempool"
      DATABASE_PASSWORD: "mempool"
      STATISTICS_ENABLED: "true"
      LIGHTNING_ENABLED: "false"
    restart: unless-stopped
    stop_grace_period: 1m
    command: "./wait-for-it.sh angornet-mempool-db:3306 --timeout=720 --strict -- ./start.sh"
    ports:
      - "8999:8999"
    volumes:
      - mempool_api:/backend/cache
    networks:
      - btcnetwork

  web:
    container_name: angornet-mempool-web
    image: mempool/frontend:latest
    user: "0:0"
    depends_on:
      - api
    environment:
      FRONTEND_HTTP_PORT: "8080"
      BACKEND_MAINNET_HTTP_HOST: "angornet-mempool-api"
      LIGHTNING: "false"
    restart: unless-stopped
    stop_grace_period: 1m
    command: "./wait-for angornet-mempool-db:3306 --timeout=720 -- nginx -g 'daemon off;'"
    ports:
      - "8080:8080"
    networks:
      - btcnetwork

networks:
  btcnetwork:
    name: angornet-network
