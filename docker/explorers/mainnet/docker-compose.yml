# Angor Mainnet Explorer Stack
#
# This runs the mempool stack only: MariaDB, mempool backend (API),
# and mempool frontend (explorer). It connects to a Bitcoin Core node
# and Fulcrum electrum server running natively on the host.
#
# TLS is handled externally via FRP reverse proxy + Caddy on the VPS.
#
# Exposed ports:
#   - 8189  -> mempool frontend + API  (indexer.angor.io)
#   - 8999  -> mempool backend API     (internal, proxied by frontend)
#
# Prerequisites:
#   - Bitcoin Core running on the host (RPC on port 8332)
#   - Fulcrum running on the host (TCP on port 50001)
#
# Configuration:
#   Set CORE_RPC_HOST, ELECTRUM_HOST to the host IP or use
#   host.docker.internal / 172.17.0.1 (default Docker bridge gateway).
#
# Usage:
#   docker compose up -d

volumes:
  mempool_api:
    name: mainnet-mempool-cache
  mempool_db:
    name: mainnet-mempool-db

services:

  db:
    container_name: mainnet-mempool-db
    image: mariadb:10.5.21
    user: "0:0"
    environment:
      MYSQL_DATABASE: "mempool"
      MYSQL_USER: "mempool"
      MYSQL_PASSWORD: "mempool"
      MYSQL_ROOT_PASSWORD: "admin"
    restart: unless-stopped
    stop_grace_period: 1m
    volumes:
      - mempool_db:/var/lib/mysql
    networks:
      - mainnet

  api:
    container_name: mainnet-mempool-api
    image: blockcore/mempool-backend:latest
    user: "0:0"
    depends_on:
      - db
    environment:
      MEMPOOL_NETWORK: "mainnet"
      MEMPOOL_BACKEND: "electrum"
      ELECTRUM_HOST: ${ELECTRUM_HOST:-172.17.0.1}
      ELECTRUM_PORT: ${ELECTRUM_PORT:-50001}
      ELECTRUM_TLS_ENABLED: "false"
      CORE_RPC_HOST: ${CORE_RPC_HOST:-172.17.0.1}
      CORE_RPC_PORT: ${CORE_RPC_PORT:-8332}
      CORE_RPC_USERNAME: ${CORE_RPC_USERNAME:-rpcuser}
      CORE_RPC_PASSWORD: ${CORE_RPC_PASSWORD:-rpcpassword}
      DATABASE_ENABLED: "true"
      DATABASE_HOST: "mainnet-mempool-db"
      DATABASE_DATABASE: "mempool"
      DATABASE_USERNAME: "mempool"
      DATABASE_PASSWORD: "mempool"
      STATISTICS_ENABLED: "true"
      ANGOR_ENABLED: "true"
    restart: unless-stopped
    stop_grace_period: 1m
    command: "./wait-for-it.sh mainnet-mempool-db:3306 --timeout=720 --strict -- ./start.sh"
    ports:
      - "8999:8999"
    volumes:
      - mempool_api:/backend/cache
    networks:
      - mainnet

  web:
    container_name: mainnet-mempool-web
    image: blockcore/mempool-frontend:latest
    user: "0:0"
    depends_on:
      - api
    environment:
      FRONTEND_HTTP_PORT: "8189"
      BACKEND_MAINNET_HTTP_HOST: "mainnet-mempool-api"
      MAINNET_ENABLED: "true"
      ROOT_NETWORK: "mainnet"
      ANGOR_ENABLED: "true"
      LIGHTNING: "false"
    restart: unless-stopped
    stop_grace_period: 1m
    command: "./wait-for mainnet-mempool-db:3306 --timeout=720 -- nginx -g 'daemon off;'"
    ports:
      - "8189:8189"
    networks:
      - mainnet

networks:
  mainnet:
    name: mainnet-network
