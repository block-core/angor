name: Extract keystore info (TEMPORARY - DELETE AFTER USE)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Write secrets to artifact
        run: |
          echo "STORE_PASS=${{ secrets.ANDROID_STORE_PASS }}" > keystore-info.txt
          echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> keystore-info.txt
          echo "KEY_PASS=${{ secrets.ANDROID_KEY_PASS }}" >> keystore-info.txt
      - uses: actions/upload-artifact@v4
        with:
          name: keystore-info
          path: keystore-info.txt
          retention-days: 1
