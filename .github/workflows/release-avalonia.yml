name: Release Avalonia App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_PATH: 'src/App.sln'
  DESKTOP_PROJECT: 'src/design/App.Desktop/App.Desktop.csproj'
  ANDROID_PROJECT: 'src/design/App.Android/App.Android.csproj'
  APP_NAME: 'Angor'
  APP_ID: 'io.angor.app'
  VENDOR: 'Blockcore'
  CLI_PROJECT: 'src/cli/Angor.Cli/Angor.Cli.csproj'
  NUGET_CERT_REVOCATION_MODE: offline

jobs:
  # Extract version from tag or input
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  # Run tests
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore design/App.Desktop/App.Desktop.csproj
      
      - name: Build
        run: dotnet build design/App.Desktop/App.Desktop.csproj --no-restore -c Release
      
      - name: Test
        run: dotnet test sdk/Angor.Sdk.Tests/Angor.Sdk.Tests.csproj -c Release --verbosity normal

  # Build Windows installer (.exe)
  build-windows:
    runs-on: windows-latest
    needs: [prepare, test]
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Install DotNetPackaging Tool
        run: dotnet tool install -g DotnetPackaging.Tool
      
      - name: Create Windows x64 Installer
        run: |
          dotnetpackager exe from-project `
            --project ${{ env.DESKTOP_PROJECT }} `
            --arch x64 `
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-win-x64-Setup.exe `
            --application-name "${{ env.APP_NAME }}" `
            --appId ${{ env.APP_ID }} `
            --version ${{ needs.prepare.outputs.version }} `
            --vendor "${{ env.VENDOR }}"

      
      - name: Create Windows arm64 Installer
        run: |
          dotnetpackager exe from-project `
            --project ${{ env.DESKTOP_PROJECT }} `
            --arch arm64 `
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-win-arm64-Setup.exe `
            --application-name "${{ env.APP_NAME }}" `
            --appId ${{ env.APP_ID }} `
            --version ${{ needs.prepare.outputs.version }} `
            --vendor "${{ env.VENDOR }}"

      - name: Create Windows x64 Portable
        run: |
          dotnet publish ${{ env.DESKTOP_PROJECT }} -c Release -r win-x64 --self-contained -p:Version=${{ needs.prepare.outputs.version }} -o publish-win-x64
          Copy-Item publish-win-x64/Angor2.exe artifacts/Angor-${{ needs.prepare.outputs.version }}-win-x64-Portable.exe

      - name: Create Windows arm64 Portable
        run: |
          dotnet publish ${{ env.DESKTOP_PROJECT }} -c Release -r win-arm64 --self-contained -p:Version=${{ needs.prepare.outputs.version }} -o publish-win-arm64
          Copy-Item publish-win-arm64/Angor2.exe artifacts/Angor-${{ needs.prepare.outputs.version }}-win-arm64-Portable.exe
      
      - name: Upload Windows artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: artifacts/*.exe

  # Sign Windows executables via SignPath.io (free OSS code signing).
  # Requires:
  #   - secret SIGNPATH_API_TOKEN  (CI user API token from SignPath)
  #   - variable SIGNPATH_ORGANIZATION_ID
  # If not configured the job cleanly no-ops and unsigned artifacts are released.
  sign-windows:
    runs-on: ubuntu-latest
    needs: [prepare, build-windows]
    permissions:
      id-token: write # required by SignPath to verify the origin of the artifact
      contents: read
      actions: read # allow SignPath connector to download the build artifact
    env:
      HAS_SIGNPATH: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
    steps:
      - name: Skip if SignPath not configured
        if: env.HAS_SIGNPATH != 'true'
        run: |
          echo "SIGNPATH_API_TOKEN secret not set — skipping Windows code signing."
          echo "Release will contain unsigned Windows executables."

      - name: Submit SignPath signing request
        if: env.HAS_SIGNPATH == 'true'
        uses: signpath/github-action-submit-signing-request@v1.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: angor
          signing-policy-slug: release-signing
          github-artifact-id: ${{ needs.build-windows.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-artifacts

      - name: Replace artifact with signed executables
        if: env.HAS_SIGNPATH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: signed-artifacts/*.exe
          overwrite: true

  # Build Linux packages (.deb, .AppImage, .rpm). macOS DMGs build natively in build-macos.
  build-linux:
    runs-on: ubuntu-latest
    needs: [prepare, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Install DotNetPackaging Tool
        run: dotnet tool install -g DotnetPackaging.Tool

      - name: Install appimagetool and dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libfuse2 squashfs-tools
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool
      
      - name: Create Linux x64 .deb
        run: |
          dotnetpackager deb from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch x64 \
            --output artifacts/angor_${{ needs.prepare.outputs.version }}_amd64.deb \
            --application-name "${{ env.APP_NAME }}" \
            --version ${{ needs.prepare.outputs.version }}

      
      - name: Create Linux x64 AppImage
        run: |
          dotnetpackager appimage from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch x64 \
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-x86_64.AppImage \
            --application-name "${{ env.APP_NAME }}"

      - name: Repackage x64 AppImage with static runtime (no libfuse2 dependency)
        run: |
          APPIMAGE=artifacts/Angor-${{ needs.prepare.outputs.version }}-x86_64.AppImage
          chmod +x "$APPIMAGE"
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE" --appimage-extract
          sed -i 's/\r$//' squashfs-root/*.desktop
          grep -q '^Categories=' squashfs-root/*.desktop || sed -i '/^\[Desktop Entry\]/a Categories=Finance;Network;' squashfs-root/*.desktop
          cp squashfs-root/usr/share/icons/hicolor/256x256/apps/angor.png squashfs-root/angor.png 2>/dev/null || true
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 appimagetool -n squashfs-root "$APPIMAGE"
          rm -rf squashfs-root

      
      - name: Create Linux x64 RPM
        run: |
          dotnetpackager rpm from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch x64 \
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-x86_64.rpm \
            --application-name "${{ env.APP_NAME }}" \
            --version ${{ needs.prepare.outputs.version }}

      
      - name: Create Linux arm64 .deb
        run: |
          dotnetpackager deb from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch arm64 \
            --output artifacts/angor_${{ needs.prepare.outputs.version }}_arm64.deb \
            --application-name "${{ env.APP_NAME }}" \
            --version ${{ needs.prepare.outputs.version }}

      
      - name: Create Linux arm64 AppImage
        run: |
          dotnetpackager appimage from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch arm64 \
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-aarch64.AppImage \
            --application-name "${{ env.APP_NAME }}"

      - name: Repackage arm64 AppImage with static runtime (no libfuse2 dependency)
        run: |
          APPIMAGE=artifacts/Angor-${{ needs.prepare.outputs.version }}-aarch64.AppImage
          # Can't execute arm64 binary on x86_64, so extract squashfs manually
          OFFSET=$(LC_ALL=C grep -abom1 'hsqs' "$APPIMAGE" | head -1 | cut -d: -f1)
          unsquashfs -offset "$OFFSET" "$APPIMAGE"
          sed -i 's/\r$//' squashfs-root/*.desktop
          grep -q '^Categories=' squashfs-root/*.desktop || sed -i '/^\[Desktop Entry\]/a Categories=Finance;Network;' squashfs-root/*.desktop
          cp squashfs-root/usr/share/icons/hicolor/256x256/apps/angor.png squashfs-root/angor.png 2>/dev/null || true
          ARCH=aarch64 APPIMAGE_EXTRACT_AND_RUN=1 appimagetool -n squashfs-root "$APPIMAGE"
          rm -rf squashfs-root

      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: artifacts/*

  # Build macOS DMGs natively on a macOS runner and ad-hoc sign them.
  # Cross-compiling on Linux left the Mach-O binaries unsigned, which makes
  # Apple Silicon report the app as "damaged and can't be opened". Building on
  # macOS and ad-hoc signing (codesign -s -) produces a valid signature so the
  # app launches behind the normal (bypassable) Gatekeeper prompt instead.
  build-macos:
    runs-on: macos-latest
    needs: [prepare, test]
    strategy:
      matrix:
        include:
          - rid: osx-x64
            arch: x64
          - rid: osx-arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish self-contained ${{ matrix.rid }}
        run: |
          dotnet publish ${{ env.DESKTOP_PROJECT }} \
            -c Release -r ${{ matrix.rid }} --self-contained \
            -p:Version=${{ needs.prepare.outputs.version }} \
            -o publish-${{ matrix.rid }}

      - name: Assemble, ad-hoc sign and pack .app into .dmg
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          APP="Angor.app"
          rm -rf "$APP" stage
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources" stage

          # Copy the published payload; drop .pdb debug symbols to slim the bundle.
          cp -R publish-${{ matrix.rid }}/. "$APP/Contents/MacOS/"
          find "$APP/Contents/MacOS" -name '*.pdb' -delete
          cp src/design/App.Desktop/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>${{ env.APP_NAME }}</string>
            <key>CFBundleDisplayName</key><string>${{ env.APP_NAME }}</string>
            <key>CFBundleIdentifier</key><string>${{ env.APP_ID }}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>Angor2</string>
            <key>CFBundleIconFile</key><string>AppIcon.icns</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          chmod +x "$APP/Contents/MacOS/Angor2"

          # .NET needs JIT + executable memory. Under hardened runtime
          # (--options runtime) the kernel blocks that unless these entitlements
          # are present, otherwise the app dies at launch with
          # "Failed to create CoreCLR, HRESULT: 0x80070008".
          cat > entitlements.plist <<'ENT'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key><true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/>
            <key>com.apple.security.cs.disable-library-validation</key><true/>
            <key>com.apple.security.cs.allow-dyld-environment-variables</key><true/>
          </dict>
          </plist>
          ENT

          # Ad-hoc sign (no Apple Developer ID needed). --options runtime keeps
          # the hardened-runtime flag set so the same bundle is notarizable later.
          codesign --force --deep --options runtime --entitlements entitlements.plist --sign - "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

          # Layout the disk image with an /Applications drag target.
          cp -R "$APP" stage/
          ln -s /Applications stage/Applications
          DMG="artifacts/Angor-${VERSION}-${{ matrix.rid }}.dmg"
          mkdir -p artifacts
          hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder stage \
            -ov -format UDZO "$DMG"
          hdiutil verify "$DMG"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: artifacts/*.dmg

  # Build Android APK (signed if keystore secrets are configured, unsigned otherwise)
  build-android:
    runs-on: ubuntu-latest
    needs: [prepare, test]
    defaults:
      run:
        working-directory: src
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Install Android workload
        run: dotnet workload install android
      
      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/android.keystore
      
      - name: Build signed APK
        if: env.HAS_KEYSTORE == 'true'
        run: |
          dotnet publish design/App.Android/App.Android.csproj \
            -c Release \
            -f net10.0-android \
            -p:ApplicationDisplayVersion=${{ needs.prepare.outputs.version }} \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:Version=${{ needs.prepare.outputs.version }} \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore=${{ github.workspace }}/android.keystore \
            -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASS }} \
            -p:AndroidSigningStorePass=${{ secrets.ANDROID_STORE_PASS }} \
            -o ${{ github.workspace }}/artifacts/
      
      - name: Build unsigned APK
        if: env.HAS_KEYSTORE != 'true'
        run: |
          dotnet publish design/App.Android/App.Android.csproj \
            -c Release \
            -f net10.0-android \
            -p:ApplicationDisplayVersion=${{ needs.prepare.outputs.version }} \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:Version=${{ needs.prepare.outputs.version }} \
            -o ${{ github.workspace }}/artifacts/
      
      - name: Rename APK
        working-directory: ${{ github.workspace }}
        run: |
          # List what we have
          ls -la artifacts/*.apk || true
          
          # Prefer the signed APK, fallback to unsigned
          SIGNED_APK=$(find artifacts -name "*-Signed.apk" -type f | head -1)
          if [ -n "$SIGNED_APK" ]; then
            # Remove unsigned APKs first, then rename signed
            find artifacts -name "*.apk" ! -name "*-Signed.apk" -delete
            mv "$SIGNED_APK" artifacts/Angor-${{ needs.prepare.outputs.version }}.apk
          else
            # No signed APK, use whatever we have
            APK_FILE=$(find artifacts -name "*.apk" -type f | head -1)
            if [ -n "$APK_FILE" ]; then
              mv "$APK_FILE" artifacts/Angor-${{ needs.prepare.outputs.version }}.apk
            fi
          fi
          
          # Show final result
          ls -la artifacts/*.apk || true
      
      - name: Cleanup keystore
        if: always()
        run: rm -f android.keystore
      
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-package
          path: ${{ github.workspace }}/artifacts/*.apk

  # Build CLI self-contained binaries
  build-cli:
    runs-on: ${{ matrix.os }}
    needs: [prepare, test]
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: angor-cli-win-x64.exe
          - os: windows-latest
            rid: win-arm64
            artifact: angor-cli-win-arm64.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: angor-cli-linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: angor-cli-linux-arm64
          - os: macos-latest
            rid: osx-x64
            artifact: angor-cli-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: angor-cli-osx-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish CLI
        run: dotnet publish ${{ env.CLI_PROJECT }} -c Release -r ${{ matrix.rid }} -p:Version=${{ needs.prepare.outputs.version }} -o publish

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mv publish/angor-cli publish/${{ matrix.artifact }}
          chmod +x publish/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item publish/angor-cli.exe publish/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.artifact }}

  # Create GitHub Release and upload all artifacts
  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-windows, sign-windows, build-linux, build-macos, build-android, build-cli]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List artifacts
        run: ls -la artifacts/
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Angor ${{ needs.prepare.outputs.version }}
          tag_name: v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish the signed Android APK to ZapStore (Nostr-based app store).
  # Only stable tags (no `-` suffix) ship; prereleases are skipped.
  # Requires repo secret ZAPSTORE_NSEC (Nostr private key for signing).
  # If the secret is unset the job runs but cleanly no-ops.
  publish-zapstore:
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: ${{ !contains(needs.prepare.outputs.version, '-') }}
    env:
      HAS_NSEC: ${{ secrets.ZAPSTORE_NSEC != '' }}
    steps:
      - name: Skip if nsec not configured
        if: env.HAS_NSEC != 'true'
        run: |
          echo "ZAPSTORE_NSEC secret not set — skipping ZapStore publish."
          echo "To enable, set the secret to the publisher nsec."

      - uses: actions/checkout@v4
        if: env.HAS_NSEC == 'true'

      - name: Install zsp
        if: env.HAS_NSEC == 'true'
        run: |
          # zsp releases ship raw binaries (no tarball) named zsp-<version>-linux-amd64.
          ZSP_VERSION=$(curl -fsSL https://api.github.com/repos/zapstore/zsp/releases/latest | jq -r .tag_name)
          ZSP_VERSION_NUM="${ZSP_VERSION#v}"
          curl -fsSL -o zsp \
            "https://github.com/zapstore/zsp/releases/download/${ZSP_VERSION}/zsp-${ZSP_VERSION_NUM}-linux-amd64"
          chmod +x zsp
          sudo install zsp /usr/local/bin/zsp
          zsp --version

      - name: Publish to ZapStore
        if: env.HAS_NSEC == 'true'
        env:
          SIGN_WITH: ${{ secrets.ZAPSTORE_NSEC }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # -q implies auto-yes; the -y flag the docs mention isn't shipped in zsp v0.4.10.
        run: zsp publish -q zapstore.yaml