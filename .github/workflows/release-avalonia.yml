name: Release Avalonia App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_PATH: 'src/App.sln'
  DESKTOP_PROJECT: 'src/design/App.Desktop/App.Desktop.csproj'
  ANDROID_PROJECT: 'src/design/App.Android/App.Android.csproj'
  APP_NAME: 'Angor'
  APP_ID: 'io.blockcore.angor'
  VENDOR: 'Blockcore'

jobs:
  # Extract version from tag or input
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  # Run tests
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore design/App.Desktop/App.Desktop.csproj
      
      - name: Build
        run: dotnet build design/App.Desktop/App.Desktop.csproj --no-restore -c Release -p:SupportNpub=${{ vars.SUPPORT_NPUB }}
      
      - name: Test
        run: dotnet test sdk/Angor.Sdk.Tests/Angor.Sdk.Tests.csproj -c Release --verbosity normal

  # Build Windows installer (.exe)
  build-windows:
    runs-on: windows-latest
    needs: [prepare, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Install DotNetPackaging Tool
        run: dotnet tool install -g DotnetPackaging.Tool
      
      - name: Create Windows x64 Installer
        run: |
          dotnetpackager exe from-project `
            --project ${{ env.DESKTOP_PROJECT }} `
            --arch x64 `
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-win-x64-Setup.exe `
            --application-name "${{ env.APP_NAME }}" `
            --appId ${{ env.APP_ID }} `
            --version ${{ needs.prepare.outputs.version }} `
            --vendor "${{ env.VENDOR }}"

      
      - name: Create Windows arm64 Installer
        run: |
          dotnetpackager exe from-project `
            --project ${{ env.DESKTOP_PROJECT }} `
            --arch arm64 `
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-win-arm64-Setup.exe `
            --application-name "${{ env.APP_NAME }}" `
            --appId ${{ env.APP_ID }} `
            --version ${{ needs.prepare.outputs.version }} `
            --vendor "${{ env.VENDOR }}"
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: artifacts/*.exe

  # Build Linux packages (.deb, .AppImage) and macOS DMG (cross-compile)
  build-linux:
    runs-on: ubuntu-latest
    needs: [prepare, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Install DotNetPackaging Tool
        run: dotnet tool install -g DotnetPackaging.Tool

      - name: Install appimagetool and dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libfuse2 squashfs-tools
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool
      
      - name: Create Linux x64 .deb
        run: |
          dotnetpackager deb from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch x64 \
            --output artifacts/angor_${{ needs.prepare.outputs.version }}_amd64.deb \
            --application-name "${{ env.APP_NAME }}" \
            --version ${{ needs.prepare.outputs.version }}

      
      - name: Create Linux x64 AppImage
        run: |
          dotnetpackager appimage from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch x64 \
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-x86_64.AppImage \
            --application-name "${{ env.APP_NAME }}"

      - name: Repackage x64 AppImage with static runtime (no libfuse2 dependency)
        run: |
          APPIMAGE=artifacts/Angor-${{ needs.prepare.outputs.version }}-x86_64.AppImage
          chmod +x "$APPIMAGE"
          APPIMAGE_EXTRACT_AND_RUN=1 "$APPIMAGE" --appimage-extract
          sed -i 's/\r$//' squashfs-root/*.desktop
          grep -q '^Categories=' squashfs-root/*.desktop || sed -i '/^\[Desktop Entry\]/a Categories=Finance;Network;' squashfs-root/*.desktop
          cp squashfs-root/usr/share/icons/hicolor/256x256/apps/angor.png squashfs-root/angor.png 2>/dev/null || true
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 appimagetool -n squashfs-root "$APPIMAGE"
          rm -rf squashfs-root

      
      - name: Create Linux x64 RPM
        run: |
          dotnetpackager rpm from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch x64 \
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-x86_64.rpm \
            --application-name "${{ env.APP_NAME }}" \
            --version ${{ needs.prepare.outputs.version }}

      
      - name: Create Linux arm64 .deb
        run: |
          dotnetpackager deb from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch arm64 \
            --output artifacts/angor_${{ needs.prepare.outputs.version }}_arm64.deb \
            --application-name "${{ env.APP_NAME }}" \
            --version ${{ needs.prepare.outputs.version }}

      
      - name: Create Linux arm64 AppImage
        run: |
          dotnetpackager appimage from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch arm64 \
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-aarch64.AppImage \
            --application-name "${{ env.APP_NAME }}"

      - name: Repackage arm64 AppImage with static runtime (no libfuse2 dependency)
        run: |
          APPIMAGE=artifacts/Angor-${{ needs.prepare.outputs.version }}-aarch64.AppImage
          # Can't execute arm64 binary on x86_64, so extract squashfs manually
          OFFSET=$(LC_ALL=C grep -abom1 'hsqs' "$APPIMAGE" | head -1 | cut -d: -f1)
          unsquashfs -offset "$OFFSET" "$APPIMAGE"
          sed -i 's/\r$//' squashfs-root/*.desktop
          grep -q '^Categories=' squashfs-root/*.desktop || sed -i '/^\[Desktop Entry\]/a Categories=Finance;Network;' squashfs-root/*.desktop
          cp squashfs-root/usr/share/icons/hicolor/256x256/apps/angor.png squashfs-root/angor.png 2>/dev/null || true
          ARCH=aarch64 APPIMAGE_EXTRACT_AND_RUN=1 appimagetool -n squashfs-root "$APPIMAGE"
          rm -rf squashfs-root

      
      - name: Create macOS x64 .dmg (cross-compile)
        run: |
          dotnetpackager dmg from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch x64 \
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-osx-x64.dmg \
            --application-name "${{ env.APP_NAME }}" \
            --icon src/design/App.Desktop/icon.png

      
      - name: Create macOS arm64 .dmg (cross-compile)
        run: |
          dotnetpackager dmg from-project \
            --project ${{ env.DESKTOP_PROJECT }} \
            --arch arm64 \
            --output artifacts/Angor-${{ needs.prepare.outputs.version }}-osx-arm64.dmg \
            --application-name "${{ env.APP_NAME }}" \
            --icon src/design/App.Desktop/icon.png

      
      - name: Upload Linux and macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-macos-packages
          path: artifacts/*

  # Build Android APK (signed if keystore secrets are configured, unsigned otherwise)
  build-android:
    runs-on: ubuntu-latest
    needs: [prepare, test]
    defaults:
      run:
        working-directory: src
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Install Android workload
        run: dotnet workload install android
      
      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/android.keystore
      
      - name: Build signed APK
        if: env.HAS_KEYSTORE == 'true'
        run: |
          dotnet publish design/App.Android/App.Android.csproj \
            -c Release \
            -f net10.0-android \
            -p:ApplicationDisplayVersion=${{ needs.prepare.outputs.version }} \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:Version=${{ needs.prepare.outputs.version }} \
            -p:SupportNpub=${{ vars.SUPPORT_NPUB }} \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore=${{ github.workspace }}/android.keystore \
            -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASS }} \
            -p:AndroidSigningStorePass=${{ secrets.ANDROID_STORE_PASS }} \
            -o ${{ github.workspace }}/artifacts/
      
      - name: Build unsigned APK
        if: env.HAS_KEYSTORE != 'true'
        run: |
          dotnet publish design/App.Android/App.Android.csproj \
            -c Release \
            -f net10.0-android \
            -p:ApplicationDisplayVersion=${{ needs.prepare.outputs.version }} \
            -p:ApplicationVersion=${{ github.run_number }} \
            -p:Version=${{ needs.prepare.outputs.version }} \
            -p:SupportNpub=${{ vars.SUPPORT_NPUB }} \
            -o ${{ github.workspace }}/artifacts/
      
      - name: Rename APK
        working-directory: ${{ github.workspace }}
        run: |
          # List what we have
          ls -la artifacts/*.apk || true
          
          # Prefer the signed APK, fallback to unsigned
          SIGNED_APK=$(find artifacts -name "*-Signed.apk" -type f | head -1)
          if [ -n "$SIGNED_APK" ]; then
            # Remove unsigned APKs first, then rename signed
            find artifacts -name "*.apk" ! -name "*-Signed.apk" -delete
            mv "$SIGNED_APK" artifacts/Angor-${{ needs.prepare.outputs.version }}.apk
          else
            # No signed APK, use whatever we have
            APK_FILE=$(find artifacts -name "*.apk" -type f | head -1)
            if [ -n "$APK_FILE" ]; then
              mv "$APK_FILE" artifacts/Angor-${{ needs.prepare.outputs.version }}.apk
            fi
          fi
          
          # Show final result
          ls -la artifacts/*.apk || true
      
      - name: Cleanup keystore
        if: always()
        run: rm -f android.keystore
      
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-package
          path: ${{ github.workspace }}/artifacts/*.apk

  # Create GitHub Release and upload all artifacts
  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-windows, build-linux, build-android]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List artifacts
        run: ls -la artifacts/
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Angor ${{ needs.prepare.outputs.version }}
          tag_name: v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}