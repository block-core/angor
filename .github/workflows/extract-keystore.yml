name: Extract Keystore (TEMPORARY - DELETE AFTER USE)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Decode keystore and upload as artifact
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
      - uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: android.keystore
          retention-days: 1
